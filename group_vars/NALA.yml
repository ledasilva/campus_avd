---
# Regional Management Settings for NALA
timezone: America/Los_Angeles

# NTP Settings (Regional)
ntp_settings:
  servers:
    - name: 10.20.1.10
      preferred: true
    - name: 10.20.1.11

# DNS Settings (Regional)
name_server:
  nodes:
    - 10.20.1.5
    - 10.20.1.6

# AAA Settings (Regional TACACS+)
aaa_settings:
  tacacs:
    servers:
      - host: 10.20.1.50
        groups: 
          - TACACS_GROUP
        key: "ENCRYPTED_KEY"
      - host: 10.20.1.51
        groups: 
          - TACACS_GROUP
        key: "ENCRYPTED_KEY"

# CloudVision (CVP) Settings
cv_settings:
  onprem_clusters:
    - name: NALA
      servers: 
        - name: 10.2.1.1
